# Build e teste de cada microservico.
#
# Roda com GOWORK=on enquanto pkg/* vive dentro do monorepo. Quando os
# pacotes forem migrados para repo externo, mudar para GOWORK=off e
# configurar GOPROXY/GOPRIVATE (docs/CI-pkg-externos.md).
#
# A logica de "rebuildar tudo" quando muda algo em pkg/ e simples:
# qualquer mudanca em pkg/* dispara build de todos os servicos. Para
# otimizar (rebuildar so quem efetivamente depende), seria necessario
# analisar os go.mod dos servicos — fica como evolucao futura.

name: service-build

on:
  push:
    branches: [main]
  pull_request:

env:
  GOWORK: "on"

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      pkg_mudou: ${{ steps.diff.outputs.pkg_mudou }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: diff
        run: |
          BASE_REF="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE_REF" ] || [ "$BASE_REF" = "0000000000000000000000000000000000000000" ]; then
            BASE_REF=$(git rev-parse HEAD~1 || echo "HEAD")
          fi
          git diff --name-only "$BASE_REF" HEAD | grep -q '^pkg/' && echo "pkg_mudou=true" >> $GITHUB_OUTPUT || echo "pkg_mudou=false" >> $GITHUB_OUTPUT

  build:
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - ordem-service
          - estoque-service
          - tarefa-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - name: Skip se servico e pkg/ nao mudaram
        id: should-skip
        run: |
          BASE_REF="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE_REF" ] || [ "$BASE_REF" = "0000000000000000000000000000000000000000" ]; then
            BASE_REF=$(git rev-parse HEAD~1 || echo "HEAD")
          fi
          SVC_MUDOU=$(git diff --name-only "$BASE_REF" HEAD | grep -q "^${{ matrix.service }}/" && echo true || echo false)
          if [ "$SVC_MUDOU" = "false" ] && [ "${{ needs.detect.outputs.pkg_mudou }}" = "false" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "${{ matrix.service }} nao mudou e pkg/ tambem nao — skip"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: go vet
        if: steps.should-skip.outputs.skip != 'true'
        working-directory: ${{ matrix.service }}
        run: go vet ./...
      - name: go test
        if: steps.should-skip.outputs.skip != 'true'
        working-directory: ${{ matrix.service }}
        run: go test -race -cover ./...
      - name: go build
        if: steps.should-skip.outputs.skip != 'true'
        working-directory: ${{ matrix.service }}
        run: go build ./...
